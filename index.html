<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo del sistema</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="topbar">
        <h1>Sistema embebido con DHT11 y motor DC</h1>
        <a href="{{ url_for('logout') }}" class="logout-btn">Cerrar sesión</a>
    </header>

    <main class="container">
        <div class="card">
            <h2>Temperatura</h2>
            <p id="temperatura" class="value">-- °C</p>
        </div>

        <div class="card">
            <h2>Humedad</h2>
            <p id="humedad" class="value">-- %</p>
        </div>

        <div class="card">
            <h2>Rango activo</h2>
            <p id="rango" class="value">--</p>
        </div>

        <div class="card">
            <h2>Velocidad</h2>
            <p id="velocidad" class="value">--</p>
        </div>

        <div class="card">
            <h2>PWM</h2>
            <p id="pwm" class="value">--</p>
        </div>

        <div class="card">
            <h2>Estado del motor</h2>
            <p id="motorEstado" class="value">--</p>
        </div>

        <div class="card full">
            <h2>Estado general del sistema</h2>
            <p id="estado" class="value">--</p>
            <div class="status-bar">
                <div id="statusFill" class="status-fill"></div>
            </div>
            <p id="ultimaActualizacion" class="update-text">Última actualización: --</p>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
