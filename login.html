<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sistema embebido</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
    <div class="login-bg-shape login-shape-1"></div>
    <div class="login-bg-shape login-shape-2"></div>

    <main class="login-wrapper">
        <section class="login-panel">
            <div class="login-brand">
                <div class="brand-badge">SE</div>
                <div>
                    <h1>Sistema embebido</h1>
                    <p>Monitoreo de temperatura, humedad y control de motor DC</p>
                </div>
            </div>

            <div class="login-card">
                <div class="login-card-header">
                    <h2>Iniciar sesión</h2>
                    <p>Ingresa para acceder al panel de monitoreo</p>
                </div>

                <form method="POST" action="{{ url_for('login') }}" class="login-form">
                    <label class="input-group">
                        <span>Usuario</span>
                        <input type="text" name="username" placeholder="Escribe tu usuario" required>
                    </label>

                    <label class="input-group">
                        <span>Contraseña</span>
                        <input type="password" name="password" placeholder="Escribe tu contraseña" required>
                    </label>

                    <button type="submit" class="primary-btn">Entrar al sistema</button>
                </form>

                {% if error %}
                    <div class="alert-error">{{ error }}</div>
                {% endif %}
            </div>
        </section>
    </main>
</body>
</html>
