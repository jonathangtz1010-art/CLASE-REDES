<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Acceso - Clasificador de Colores</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>

<body>
  <main class="card loginBox">

    <header class="top">
      <div>
        <h1>Acceso de Operador</h1>
        <p class="hint">
          Panel del clasificador automático de colores.
        </p>
      </div>

      <div class="status warning">Sistema protegido</div>
    </header>

    <section class="panel">
      <h2>Iniciar sesión</h2>

      <form method="POST" action="/login" class="controls">

        <div class="row">
          <label for="username">Usuario</label>
          <input
            id="username"
            name="username"
            type="text"
            placeholder="Ingresa tu usuario"
            required
          />
        </div>

        <div class="row">
          <label for="password">Contraseña</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Ingresa tu contraseña"
            required
          />
        </div>

        <button class="btn start" type="submit">
          Entrar al sistema
        </button>

        {% if error %}
          <p class="hint" style="color:#ffb3b3;">
            {{ error }}
          </p>
        {% else %}
          <p class="hint">
            Ingresa tus credenciales para acceder al panel de operación.
          </p>
        {% endif %}

      </form>
    </section>

    <section class="panel" style="margin-top:16px;">
      <h2>Proyecto</h2>

      <div class="dataGrid">
        <div class="dataItem">
          <span>Sistema</span>
          <strong>Clasificador</strong>
        </div>

        <div class="dataItem">
          <span>Colores</span>
          <strong>4</strong>
        </div>

        <div class="dataItem">
          <span>Meta</span>
          <strong>30 piezas</strong>
        </div>

        <div class="dataItem">
          <span>Modo</span>
          <strong>Operador</strong>
        </div>
      </div>
    </section>

  </main>
</body>
</html>
